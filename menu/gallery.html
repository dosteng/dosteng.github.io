<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Dosteng</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/menu.css" />

<style>
/* ========== BASE ========== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}
body{
    background:#f4f4f4;
    color:#333;
}

/* ========== HERO ========== */
.gallery-hero{
    height:55vh;
    background:
      linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
      url('../assets/images/santai.png') center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#fff;
}
.gallery-hero h1{
    font-size:44px;
}
.gallery-hero p{
    max-width:600px;
    margin-top:10px;
    opacity:.9;
}

/* ========== SECTION ========== */
.gallery-section{
    padding:80px 8%;
}

/* ========== GRID ========== */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}
.gallery-item{
    position:relative;
    overflow:hidden;
    border-radius:16px;
    cursor:pointer;
}
.gallery-item img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.5s;
}
.gallery-item:hover img{
    transform:scale(1.1);
}
.gallery-item::after{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.25);
    opacity:0;
    transition:.4s;
}
.gallery-item:hover::after{
    opacity:1;
}

/* ========== LIGHTBOX ========== */
.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
    opacity:0;
    visibility:hidden;
    transition:.4s;
}
.lightbox.active{
    opacity:1;
    visibility:visible;
}
.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
}
.lightbox span{
    position:absolute;
    top:30px;
    right:40px;
    font-size:40px;
    color:#fff;
    cursor:pointer;
}

/* ========== FOOTER ========== */
footer{
    background:#111;
    color:#aaa;
    text-align:center;
    padding:20px;
    margin-top:60px;
    font-size:13px;
}
</style>
</head>

<body>

    <!-- ================= navigasi ================= -->

  <nav class="nav-menu">

  </nav>

  <div class="hamburger" id="hamburger">

</header>

<!-- MOBILE MENU -->

<div class="overlay" id="overlay"></div>

<!-- HERO -->
<section class="gallery-hero">
    <div>
        <h1>Gallery</h1>
        <p>Potret suasana, aktivitas, dan keindahan kawasan DOSTENG</p>
    </div>
</section>

<!-- GALLERY -->
<section class="gallery-section">
    <div class="gallery-grid">

        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="../assets/images/galery/gambar1.png">
        </div>

        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="../assets/images/galery/gambar2.png">
        </div>

        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="../assets/images/galery/gambar3.png">
        </div>

        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="../assets/images/galery/gambar4.png">

        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="../assets/images/galery/gambar5.png">
        </div>

        <div class="gallery-item" onclick="openLightbox(this)">
            <img src="../assets/images/galery/gambar6.png">
        </div>

    </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img">
</div>

<footer>
    © 2026 DOSTENG. All Rights Reserved.
</footer>

<script>
function openLightbox(el){
    const img = el.querySelector('img').src;
    document.getElementById('lightbox-img').src = img;
    document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(){
    document.getElementById('lightbox').classList.remove('active');
}
</script>
